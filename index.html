<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minute Cryptic - Prova</title>
    <style>
      :root {
        --mc-blue: #add3ff;
        --mc-blue-dark: #5ca8f5;
        --mc-pink: #f5d1fd;
        --mc-yellow: #ffe16b;
        --black: #111;
      }

      * {
        box-sizing: border-box;
      }

      body {
        --tw-bg-opacity: 1;

        background-color: rgb(173 211 255 / var(--tw-bg-opacity, 1));
        margin: 0;
        font-family: Arial, sans-serif;
        color: var(--black);
      }

      .page {
        max-width: 980px;
        margin: 0 auto;
        min-height: 100vh;
        padding-bottom: 24px;
      }

      .top {
        --tw-bg-opacity: 1;

        background-color: rgb(173 211 255 / var(--tw-bg-opacity, 1));
        color: #fff;
        padding: 12px 16px;
      }

      .top-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .pill {
        border: 3px solid var(--black);
        border-radius: 999px;
        padding: 8px 18px;
        background: var(--mc-pink);
        font-weight: 700;
      }

      .section {
        padding: 14px 16px;
      }

      .card {
        background: #fff;
        border: 3px solid var(--black);
        border-radius: 18px;
        box-shadow: 4px 4px 0 0 var(--black);
        padding: 16px;
      }

      .title {
        margin: 0 0 12px;
        font-size: 24px;
        text-align: center;
      }

      .subtitle {
        margin: 0 0 10px;
        font-size: 18px;
        font-weight: 800;
      }

      .clue {
        text-align: center;
        font-size: 18px;
        margin: 0 0 16px;
      }

      .clue-part {
        padding: 0 2px;
        border-radius: 4px;
        transition: background-color 0.2s ease-in-out;
      }

      .clue-highlight-definition {
        --tw-bg-opacity: 1;

        background-color: rgb(213 232 255 / var(--tw-bg-opacity, 1));
      }

      .clue-highlight-fodder {
        --tw-bg-opacity: 1;

        background-color: rgb(255 242 177 / var(--tw-bg-opacity, 1));
      }

      .clue-highlight-indicator {
        --tw-bg-opacity: 1;

        background-color: rgb(245 209 253 / var(--tw-bg-opacity, 1));
      }

      .solution {
        display: flex;
        flex-direction: column;
        gap: 10px;
        align-items: center;
      }

      .word {
        display: flex;
        gap: 6px;
        flex-wrap: nowrap;
      }

      .box {
        width: 34px;
        height: 34px;
        border: 2px solid var(--black);
        border-radius: 6px;
        text-align: center;
        font-size: 20px;
        text-transform: uppercase;
      }

      .box.hint-letter {
        --tw-bg-opacity: 1;

        background-color: rgb(255 242 177 / var(--tw-bg-opacity, 1));
      }

      .solution-actions {
        display: flex;
        gap: 12px;
        justify-content: center;
        align-items: center;
        margin-top: 14px;
      }

      .scribble-space-view {
        margin-top: 14px;
      }

      .scribble-space-shell {
        border: 3px solid var(--black);
        border-radius: 16px;
        background: #fff;
        box-shadow: 3px 3px 0 0 var(--black);
        padding: 10px 10px 0;
      }

      .scribble-keyboard-row {
        margin: 0;
        height: 0;
      }

      [data-scribble-container='true'] {
        min-height: 310px;
        position: relative;
        overflow: hidden;
        touch-action: none;
        user-select: none;
      }

      .scribble-keyboard-input {
        position: absolute;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
        border: 0;
        padding: 0;
      }

      .scribble-trash-bg,
      .scribble-trash-icon {
        position: absolute;
        left: 50%;
        bottom: 0;
        pointer-events: none;
        opacity: 0;
        transform: translateX(-50%) translateY(100%);
      }

      .scribble-trash-bg {
        bottom: -44px;
      }

      .scribble-trash-icon {
        bottom: -12px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .scribble-trash-icon svg {
        margin-top: 0 !important;
      }

      .scribble-trash-visible {
        opacity: 1 !important;
        transform: translateX(-50%) translateY(0) !important;
      }

      .scribble-trash-bg.scribble-trash-active {
        background-color: rgba(220, 38, 38, 0.35) !important;
        width: 78% !important;
        height: 84px !important;
      }

      .scribble-trash-icon.scribble-trash-active {
        transform: translateX(-50%) translateY(0) scale(1.08) !important;
      }

      .scribble-tile {
        position: absolute;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2px solid var(--black);
        border-radius: 10px;
        font-family: Georgia, serif;
        font-size: 38px;
        line-height: 1;
        user-select: none;
        touch-action: none;
        cursor: grab;
      }

      .scribble-tile.is-dragging {
        cursor: grabbing;
        opacity: 0.9;
      }

      .scribble-tile-letter {
        transform: translateY(-2px);
        pointer-events: none;
      }

      .bg-mc-pink {
        background: var(--mc-pink);
      }

      .shadow-btn {
        height: 50px;
        min-height: 50px;
        border: 3px solid var(--black);
        border-radius: 999px;
        padding: 0 24px;
        font-family: Georgia, serif;
        font-size: 20px;
        font-weight: 700;
        box-shadow: 3px 3px 0 0 var(--black);
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .shadow-btn p {
        margin: 0;
        line-height: 1;
      }

      .shadow-btn-yellow {
        background: var(--mc-yellow);
      }

      .shadow-btn-pink {
        background: var(--mc-pink);
      }

      .shadow-icon-btn {
        width: 48px;
        height: 48px;
        border: 3px solid var(--black);
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: var(--mc-blue);
        box-shadow: 3px 3px 0 0 var(--black);
        cursor: pointer;
        padding: 0;
      }

      .hint-modal-layer {
        position: fixed;
        inset: 0;
        z-index: 100;
        pointer-events: none;
      }

      .hint-modal-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(173, 211, 255, 0.5);
        opacity: 0;
        transition: opacity 0.2s ease-in-out;
      }

      .hint-modal-wrap {
        position: absolute;
        inset-inline: 0;
        bottom: 16px;
        display: flex;
        justify-content: center;
        padding: 0 16px;
      }

      .hint-modal-panel {
        position: relative;
        width: min(100%, 400px);
        max-height: calc(100vh - 2rem);
        border: 3px solid var(--black);
        box-shadow: 3px 3px 0 0 var(--black);
        border-radius: 16px;
        background: #fff;
        margin: auto;
        display: flex;
        flex-direction: column;
        transform: translateY(110%);
        transition: transform 0.2s ease-in-out;
      }

      .hint-modal-header {
        display: flex;
        align-items: center;
        padding: 16px;
        padding-right: 56px;
        flex-shrink: 0;
      }

      .hint-modal-title {
        margin: 0;
        color: #000;
        font-size: 16px;
      }

      .hint-modal-body {
        display: flex;
        flex-direction: column;
        padding-bottom: 20px;
        flex: 1;
        min-height: 0;
        gap: 20px;
      }

      .hint-modal-content {
        flex-shrink: 0;
        padding: 0 16px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .hint-main-view[hidden],
      .hint-detail-view[hidden],
      .hint-back[hidden] {
        display: none;
      }

      .hint-back {
        font-size: 32px;
        border: 0;
        background: transparent;
        cursor: pointer;
        color: #111;
        padding: 0;
        margin-right: 8px;
        line-height: 1;
      }

      .hint-detail-view {
        display: flex;
        flex-direction: column;
        padding-bottom: 20px;
        flex: 1;
        min-height: 0;
        gap: 20px;
      }

      .hint-detail-scroll {
        overflow-y: auto;
        padding: 0 16px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        min-height: 0;
        flex: 1;
      }

      .hint-detail-text-wrap {
        flex: 1;
        min-height: 0;
      }

      .hint-detail-text-shell {
        color: #000;
        font-size: 32px;
        height: 100%;
      }

      .hint-detail-text {
        color: #000;
        font-size: 18px;
        margin: 0;
      }

      .hint-list {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
      }

      .hint-option {
        font-weight: 800;
        font-family: Georgia, serif;
        transition: opacity 0.15s ease-in-out;
        border: 0;
        background: transparent;
        cursor: pointer;
        padding: 16px 0;
      }

      .hint-option-label {
        position: relative;
        display: inline-block;
      }

      .hint-option-line {
        position: absolute;
        left: 0;
        right: 0;
        height: 8px;
        bottom: 1px;
        z-index: 0;
        border-radius: 4px;
      }

      .hint-option-text {
        position: relative;
        padding: 0 4px;
        margin: 0;
        text-align: center;
        z-index: 1;
        font-size: 24px;
      }

      .hint-divider {
        padding-top: 4px;
        border-top: 2px solid #eef5ff;
      }

      .hint-close {
        position: absolute;
        top: 16px;
        right: 16px;
        font-size: 32px;
        border: 0;
        background: transparent;
        cursor: pointer;
        color: #111;
      }

      .hint-modal-layer.is-open {
        pointer-events: auto;
      }

      .hint-modal-layer.is-open .hint-modal-backdrop {
        opacity: 1;
      }

      .hint-modal-layer.is-open .hint-modal-panel {
        transform: translateY(0);
      }

      .solution.is-shaking .box {
        animation: shake-box 0.35s ease-in-out;
      }

      @keyframes shake-box {
        0%,
        100% {
          transform: translateX(0);
        }

        20% {
          transform: translateX(-5px);
        }

        40% {
          transform: translateX(5px);
        }

        60% {
          transform: translateX(-4px);
        }

        80% {
          transform: translateX(4px);
        }
      }

      .result-card-host {
        width: 100%;
      }

      .result-card-shell {
        background: #fff;
        border: 4px solid var(--black);
        border-radius: 12px;
        padding: 20px 16px;
        box-shadow: 4px 4px 0 0 var(--black);
      }

      .result-card-dots {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 8px;
      }

      .result-card-dot {
        border: 2px solid var(--black);
        width: 20px;
        height: 20px;
        border-radius: 10px;
        background: var(--mc-pink);
      }

      .result-card-title {
        text-align: center;
        font-size: 32px;
        font-weight: 800;
        margin: 10px 0 4px;
      }

      .result-card-subtitle {
        text-align: center;
        margin: 0;
      }

      .result-card-share {
        display: flex;
        justify-content: center;
        margin-top: 16px;
      }

      @media (max-width: 900px) {
        .page {
          max-width: 100%;
          padding-bottom: 16px;
        }

        .section {
          padding: 12px;
        }

        .card {
          padding: 14px;
          border-radius: 14px;
        }

        .title {
          font-size: 22px;
        }

        .subtitle {
          font-size: 17px;
        }

        .clue {
          font-size: 16px;
          line-height: 1.35;
        }

        .solution-actions {
          flex-wrap: wrap;
          gap: 10px;
        }

        .hint-modal-wrap {
          bottom: 8px;
          padding: 0 10px;
        }

        .hint-modal-panel {
          max-height: calc(100vh - 1rem);
        }
      }

      @media (max-width: 600px) {
        .top {
          padding: 10px 12px;
        }

        .section {
          padding: 10px;
        }

        .card {
          padding: 12px;
          box-shadow: 3px 3px 0 0 var(--black);
        }

        .title {
          font-size: 20px;
          margin-bottom: 10px;
        }

        .clue {
          font-size: 15px;
          margin-bottom: 12px;
        }

        .solution {
          gap: 8px;
          overflow-x: hidden;
          padding-bottom: 0;
        }

        .word {
          gap: 4px;
          width: 100%;
          margin: 0;
          justify-content: center;
        }

        .word[aria-label='congratulations'] {
          gap: 2px;
        }

        .word[aria-label='congratulations'] .box {
          width: calc((100% - 28px) / 15);
          min-width: 14px;
          max-width: 22px;
          height: 28px;
          font-size: 14px;
        }

        .box {
          width: 22px;
          height: 30px;
          font-size: 15px;
          border-radius: 5px;
        }

        .shadow-btn {
          min-height: 46px;
          height: 46px;
          font-size: 18px;
          padding: 0 16px;
        }

        .shadow-icon-btn {
          width: 46px;
          height: 46px;
        }

        .scribble-space-shell {
          padding: 8px;
        }

        [data-scribble-container='true'] {
          min-height: 260px;
        }

        .hint-modal-header {
          padding: 12px;
          padding-right: 48px;
        }

        .hint-modal-content,
        .hint-detail-scroll {
          padding: 0 12px;
        }

        .hint-option {
          padding: 12px 0;
        }

        .hint-option-text {
          font-size: 21px;
        }

        .hint-detail-text {
          font-size: 16px;
          line-height: 1.4;
        }

        .hint-close,
        .hint-back {
          font-size: 28px;
        }

        .result-card-shell {
          padding: 16px 12px;
        }

        .result-card-title {
          font-size: 28px;
        }
      }

      @media (max-width: 390px) {
        .box {
          width: 20px;
          height: 28px;
          font-size: 14px;
        }

        .word {
          gap: 3px;
        }

        .solution-actions {
          gap: 8px;
        }

        .shadow-btn {
          font-size: 17px;
          padding: 0 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="top">
        <div class="top-row">
          <strong>Minute Cryptic</strong>
        </div>
      </header>

      <section class="section">
        <div class="card">
          <h1 class="title">Today's clue</h1>
          <p class="clue">
            "<span class="clue-part" id="clue-definition">Kudos, physician!</span>
            <span class="clue-part" id="clue-fodder">Ila, doctor on stunt cargo</span>
            <span class="clue-part" id="clue-indicator">mixed up</span>" (15 - 6)
          </p>
        </div>
      </section>

      <section class="section">
        <div class="card">
          <h2 class="subtitle">Soluzione</h2>
          <div class="solution" id="solution-grid" aria-label="Caselle soluzione">
            <div class="word" aria-label="congratulations">
              <input class="box" maxlength="1" />
              <input class="box" maxlength="1" />
              <input class="box" maxlength="1" />
              <input class="box" maxlength="1" />
              <input class="box" maxlength="1" />
              <input class="box" maxlength="1" />
              <input class="box" maxlength="1" />
              <input class="box" maxlength="1" />
              <input class="box" maxlength="1" />
              <input class="box" maxlength="1" />
              <input class="box" maxlength="1" />
              <input class="box" maxlength="1" />
              <input class="box" maxlength="1" />
              <input class="box" maxlength="1" />
              <input class="box" maxlength="1" />
            </div>
            <div class="word" aria-label="doctor">
              <input class="box" maxlength="1" />
              <input class="box" maxlength="1" />
              <input class="box" maxlength="1" />
              <input class="box" maxlength="1" />
              <input class="box" maxlength="1" />
              <input class="box" maxlength="1" />
            </div>
          </div>
          <div class="solution-actions" id="solution-actions" aria-label="Azioni soluzione">
            <button
              aria-label="Toggle scribble space"
              id="scribble-btn"
              class="size-12 font-bold focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-black flex items-center justify-center font-serif border-[3px] border-black rounded-full transition-all duration-300 active:opacity-50 enabled:hover:scale-[105%] shadow-[3px_3px_0px_0px_black] disabled:opacity-50 disabled:shadow-[3px_3px_0px_0px_rgba(0,0,0,0)] max-w-full bg-mc-blue p-0 shadow-icon-btn"
              data-sentry-component="ShadowIconButton"
              data-sentry-source-file="ShadowIconButton.tsx"
              type="button"
            >
              <div class="relative min-w-0 flex">
                <span class="text-black text-center p-0" style="font-size: 20px"
                  ><svg
                    width="40"
                    height="40"
                    viewBox="0 0 40 40"
                    fill="none"
                    data-sentry-element="svg"
                    data-sentry-component="ScribbleIcon"
                    data-sentry-source-file="ScribbleIcon.tsx"
                  >
                    <path
                      d="M11 18.5879C14.1979 17.7315 21.2911 8.41827 24.819 11.6967C26.6179 13.3683 15.4341 21.0046 15.4182 24.3633C15.4085 26.4214 27.3456 17.0731 28.4865 18.236C31.0441 20.8429 23.2043 24.7621 23.418 28.2673C23.5524 30.4719 27.1602 27.0614 28.1183 26.4005"
                      stroke="black"
                      stroke-width="2.7"
                      stroke-linecap="round"
                      data-sentry-element="path"
                      data-sentry-source-file="ScribbleIcon.tsx"
                    ></path></svg
                ></span>
              </div>
            </button>

            <button
              data-sentry-element="ShadowButton"
              data-sentry-source-file="ShadowButton.tsx"
              aria-label="hints"
              id="hints-btn"
              class="min-h-[48px] max-h-[96px] font-bold focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-black flex items-center justify-center px-[32px] font-serif border-[3px] border-black rounded-full transition-all duration-300 active:opacity-50 enabled:hover:scale-[105%] shadow-[3px_3px_0px_0px_black] disabled:opacity-50 disabled:shadow-[3px_3px_0px_0px_rgba(0,0,0,0)] max-w-full bg-mc-yellow shadow-btn shadow-btn-yellow"
              type="button"
            >
              <div class="relative min-w-0 flex">
                <p class="text-black text-center -translate-y-[2px] line-clamp-3 p-[0.14em]" style="font-size: 20px">hints</p>
              </div>
            </button>
            <button
              data-sentry-element="ShadowButton"
              data-sentry-source-file="ShadowButton.tsx"
              aria-label="check"
              id="check-btn"
              class="min-h-[48px] max-h-[96px] font-bold focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-black flex items-center justify-center px-[32px] font-serif border-[3px] border-black rounded-full transition-all duration-300 active:opacity-50 enabled:hover:scale-[105%] shadow-[3px_3px_0px_0px_black] disabled:opacity-50 disabled:shadow-[3px_3px_0px_0px_rgba(0,0,0,0)] max-w-full bg-mc-pink shadow-btn shadow-btn-pink"
              type="button"
            >
              <div class="relative min-w-0 flex">
                <p class="text-black text-center -translate-y-[2px] line-clamp-3 p-[0.14em]" style="font-size: 20px">check</p>
              </div>
            </button>
          </div>

          <div class="scribble-space-view" id="scribble-space-view" hidden>
            <div class="scribble-space-shell">
              <div class="scribble-keyboard-row">
                <input
                  id="scribble-keyboard-input"
                  class="scribble-keyboard-input"
                  type="text"
                  inputmode="text"
                  autocomplete="off"
                  autocorrect="off"
                  autocapitalize="none"
                  spellcheck="false"
                  aria-label="Scribble keyboard input"
                />
              </div>
              <div
                data-scribble-container="true"
                id="scribble-container"
                class="flex-1 flex flex-col relative overflow-hidden touch-none select-none"
                data-sentry-component="ScribbleSpace"
                data-sentry-source-file="ScribbleSpace.tsx"
              >
                <div
                  class="absolute left-0 right-0 bottom-0 pointer-events-none"
                  data-sentry-component="ScribbleSpaceClearOverlay"
                  data-sentry-source-file="ScribbleSpaceClearOverlay.tsx"
                  style="
                    top: 58px;
                    background-color: rgba(220, 38, 38, 0.35);
                    z-index: 0;
                    clip-path: ellipse(35% 36px at 50% 100%);
                    opacity: 0;
                  "
                ></div>
                <div
                  id="scribble-trash-bg"
                  class="absolute bottom-0 left-1/2 pointer-events-none scribble-trash-bg"
                  style="
                    width: 70%;
                    height: 72px;
                    border-radius: 50%;
                    opacity: 0;
                    transform: translateX(-50%) translateY(100%);
                    transition:
                      opacity 200ms,
                      transform 200ms,
                      background-color 150ms,
                      width 200ms,
                      height 200ms;
                    background-color: rgba(120, 120, 120, 0.18);
                  "
                ></div>
                <div
                  id="scribble-trash-icon"
                  class="absolute bottom-0 left-1/2 pointer-events-none flex items-center justify-center scribble-trash-icon"
                  style="
                    width: 70%;
                    height: 72px;
                    opacity: 0;
                    transform: translateX(-50%) translateY(100%);
                    transition:
                      opacity 200ms,
                      transform 200ms;
                  "
                >
                  <svg
                    stroke="currentColor"
                    fill="currentColor"
                    stroke-width="0"
                    viewBox="0 0 448 512"
                    class="text-white"
                    data-sentry-element="FaRegTrashAlt"
                    data-sentry-source-file="ScribbleSpaceTrash.tsx"
                    height="1em"
                    width="1em"
                    xmlns="http://www.w3.org/2000/svg"
                    style="margin-top: 0; font-size: 21.6px"
                  >

    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const hintsBtn = document.getElementById('hints-btn') || document.querySelector('[aria-label="hints"]');
        const hintModal = document.getElementById('hint-modal');
        const hintModalClose = document.getElementById('hint-modal-close');
        const hintModalBackdrop = document.getElementById('hint-modal-backdrop');
        const hintMainView = document.getElementById('hint-main-view');
        const hintDetailView = document.getElementById('hint-detail-view');
        const hintBackBtn = document.getElementById('hint-back-btn');
        const hintDetailText = document.getElementById('hint-detail-text');
        const modalTitle = document.getElementById('modal-title');
        const showIndicatorsBtn = document.getElementById('hint-show-indicators');
        const showFodderBtn = document.getElementById('hint-show-fodder');
        const showDefinitionBtn = document.getElementById('hint-show-definition');
        const showLetterBtn = document.getElementById('hint-show-letter');

        const clueDefinition = document.getElementById('clue-definition');
        const clueFodder = document.getElementById('clue-fodder');
        const clueIndicator = document.getElementById('clue-indicator');
        const checkBtn = document.getElementById('check-btn');
        const solutionGrid = document.getElementById('solution-grid');
        const solutionActions = document.getElementById('solution-actions');
        const boxes = Array.from(document.querySelectorAll('.box'));
        const scribbleBtn = document.getElementById('scribble-btn');
        const scribbleSpaceView = document.getElementById('scribble-space-view');
        const scribbleContainer = document.getElementById('scribble-container');
        const scribbleKeyboardInput = document.getElementById('scribble-keyboard-input');
        const scribbleTrashBg = document.getElementById('scribble-trash-bg');
        const scribbleTrashIcon = document.getElementById('scribble-trash-icon');
        const isMobileInputMode =
          (typeof window.matchMedia === 'function' && window.matchMedia('(pointer: coarse)').matches) || 'ontouchstart' in window;

        const clueParts = [clueDefinition, clueFodder, clueIndicator].filter(Boolean);

        if (!hintsBtn || !hintModal || !hintModalClose || !hintModalBackdrop) {
          return;
        }

        const hintDetailMessages = {
          definition:
            "Our definition here is 'Kudos, physician!', and (with a little stretch from our escalmation mark) our answer will be another word for that.",
          fodder:
            "This clue's fodder is 'Ila, doctor on stunt cargo'. We'll need to find out how to use it with the clue'indicator(s) to construct our answer",
          indicators: `This clue's indicators is "mixed up" that is an anagram indicator, so you have to anagram the fodders.`
        };

        const showHintsMenuView = () => {
          if (hintMainView) {
            hintMainView.hidden = false;
          }

          if (hintDetailView) {
            hintDetailView.hidden = true;
          }

          if (hintBackBtn) {
            hintBackBtn.hidden = true;
          }

          if (modalTitle) {
            modalTitle.textContent = 'Select a hint';
          }
        };

        const showHintDetailView = type => {
          if (hintMainView) {
            hintMainView.hidden = true;
          }

          if (hintDetailView) {
            hintDetailView.hidden = false;
          }

          if (hintBackBtn) {
            hintBackBtn.hidden = false;
          }

          if (modalTitle) {
            modalTitle.textContent = '';
          }

          if (hintDetailText) {
            hintDetailText.textContent = hintDetailMessages[type] || '';
          }
        };

        const openHintModal = () => {
          showHintsMenuView();
          hintModal.classList.add('is-open');
          hintModal.setAttribute('aria-hidden', 'false');
        };

        const closeHintModal = () => {
          showHintsMenuView();
          hintModal.classList.remove('is-open');
          hintModal.setAttribute('aria-hidden', 'true');
        };

        const highlightCluePart = (targetPart, highlightClass) => {
          if (!targetPart) {
            return;
          }

          targetPart.classList.add(highlightClass);
        };

        const shakeSolution = () => {
          if (!solutionGrid) {
            return;
          }

          solutionGrid.classList.remove('is-shaking');
          void solutionGrid.offsetWidth;
          solutionGrid.classList.add('is-shaking');

          window.setTimeout(() => {
            solutionGrid.classList.remove('is-shaking');
          }, 400);
        };

        const solutionLetters = 'congratulationsdoctor';
        let nextLetterIndex = 0;
        let nextTileId = 1;
        const maxScribbleTiles = 21;
        let suppressKeyboardFocusUntil = 0;
        const revealNextLetter = () => {
          if (!boxes.length || nextLetterIndex >= solutionLetters.length) {
            return;
          }

          while (nextLetterIndex < solutionLetters.length) {
            const targetBox = boxes[nextLetterIndex];
            const targetLetter = solutionLetters[nextLetterIndex];

            targetBox.value = targetLetter;
            targetBox.classList.add('hint-letter');

            nextLetterIndex += 1;
            break;
          }
        };

        boxes.forEach((box, index) => {
          box.addEventListener('input', () => {
            box.value = box.value.slice(0, 1);

            if (box.value && index < boxes.length - 1) {
              boxes[index + 1].focus();
            }
          });

          box.addEventListener('keydown', event => {
            if (event.key === 'Backspace' && !box.value && index > 0) {
              boxes[index - 1].focus();
            }
          });
        });

        const dragState = {
          tile: null,
          pointerId: null,
          offsetX: 0,
          offsetY: 0,
          containerRect: null,
          touchId: null,
          isOverTrash: false
        };

        const updateTrashState = (isVisible, isActive) => {
          if (scribbleTrashBg) {
            scribbleTrashBg.classList.toggle('scribble-trash-visible', isVisible);
            scribbleTrashBg.classList.toggle('scribble-trash-active', isVisible && isActive);
          }

          if (scribbleTrashIcon) {
            scribbleTrashIcon.classList.toggle('scribble-trash-visible', isVisible);
            scribbleTrashIcon.classList.toggle('scribble-trash-active', isVisible && isActive);
          }
        };

        const isPointOverTrash = (clientX, clientY) => {
          if (!scribbleTrashBg) {
            return false;
          }

          const trashRect = scribbleTrashBg.getBoundingClientRect();

          return clientX >= trashRect.left && clientX <= trashRect.right && clientY >= trashRect.top && clientY <= trashRect.bottom;
        };

        const startDraggedTile = (tile, clientX, clientY, touchId = null, pointerId = null) => {
          if (!scribbleContainer) {
            return;
          }

          const tileRect = tile.getBoundingClientRect();
          dragState.tile = tile;
          dragState.offsetX = clientX - tileRect.left;
          dragState.offsetY = clientY - tileRect.top;
          dragState.containerRect = scribbleContainer.getBoundingClientRect();
          dragState.touchId = touchId;
          dragState.pointerId = pointerId;
          dragState.isOverTrash = false;
          suppressKeyboardFocusUntil = Date.now() + 250;

          if (scribbleKeyboardInput) {
            scribbleKeyboardInput.blur();
          }

          tile.classList.add('is-dragging');
          tile.style.transition = 'none';
          updateTrashState(true, false);
        };

        const moveDraggedTile = (clientX, clientY) => {
          if (!dragState.tile || !dragState.containerRect) {
            return;
          }

          const tileSize = dragState.tile.getBoundingClientRect().width;
          const maxLeft = dragState.containerRect.width - tileSize;
          const maxTop = dragState.containerRect.height - tileSize;
          const nextLeft = Math.min(Math.max(0, clientX - dragState.containerRect.left - dragState.offsetX), maxLeft);
          const nextTop = Math.min(Math.max(0, clientY - dragState.containerRect.top - dragState.offsetY), maxTop);

          dragState.tile.style.left = `${nextLeft}px`;
          dragState.tile.style.top = `${nextTop}px`;

          const isOverTrash = isPointOverTrash(clientX, clientY);

          if (isOverTrash !== dragState.isOverTrash) {
            dragState.isOverTrash = isOverTrash;
            updateTrashState(true, isOverTrash);
          }
        };

        const stopDraggedTile = (clientX = null, clientY = null) => {
          if (!dragState.tile) {
            return;
          }

          const droppedTile = dragState.tile;
          const shouldDeleteTile =
            dragState.isOverTrash || (typeof clientX === 'number' && typeof clientY === 'number' && isPointOverTrash(clientX, clientY));

          droppedTile.classList.remove('is-dragging');
          droppedTile.style.transition = 'left 0.2s, top 0.2s, opacity 0.2s';

          if (shouldDeleteTile) {
            droppedTile.remove();
          }

          dragState.tile = null;
          dragState.containerRect = null;
          dragState.touchId = null;
          dragState.pointerId = null;
          dragState.isOverTrash = false;
          updateTrashState(false, false);
        };

        const createScribbleTile = letter => {
          if (!scribbleContainer) {
            return;
          }

          const existingTiles = scribbleContainer.querySelectorAll('.scribble-tile').length;

          if (existingTiles >= maxScribbleTiles) {
            return;
          }

          const containerRect = scribbleContainer.getBoundingClientRect();
          const tileSize = 46;
          const tileGap = 8;
          const step = tileSize + tileGap;
          const startX = 12;
          const startY = 12;
          const availableWidth = Math.max(tileSize, containerRect.width - startX * 2);
          const columns = Math.max(1, Math.floor((availableWidth - tileSize) / step) + 1);
          const row = Math.floor(existingTiles / columns);
          const col = existingTiles % columns;
          const xPosition = Math.min(startX + col * step, Math.max(0, containerRect.width - tileSize));
          const yPosition = Math.min(startY + row * step, Math.max(0, containerRect.height - tileSize));

          const tile = document.createElement('div');
          const tileId = String(nextTileId++);
          const normalizedLetter = letter.toUpperCase();
          const visibleLetter = letter.toLowerCase();

          tile.setAttribute('data-tile-id', tileId);
          tile.setAttribute('data-tile-letter', normalizedLetter);
          tile.setAttribute('data-sentry-component', 'ScribbleSpaceTileInner');
          tile.setAttribute('data-sentry-source-file', 'ScribbleSpaceTile.tsx');
          tile.className =
            'scribble-tile absolute outline-black aspect-square -outline-offset-2 outline-4 outline-none flex items-center justify-center font-serif overflow-visible rounded-lg select-none bg-white cursor-grab';
          tile.style.cssText = `width: 46px; height: 46px; left: ${xPosition}px; top: ${yPosition}px; touch-action: none; transition: left 0.2s, top 0.2s, opacity 0.2s`;
          tile.innerHTML = `<span class="scribble-tile-letter -translate-y-0.5 text-4xl select-none pointer-events-none">${visibleLetter}</span>`;

          scribbleContainer.appendChild(tile);
        };

        const focusScribbleKeyboard = () => {
          if (!scribbleKeyboardInput || !scribbleSpaceView || scribbleSpaceView.hidden) {
            return;
          }

          scribbleKeyboardInput.focus({ preventScroll: true });
          scribbleKeyboardInput.value = '';
        };

        const requestMobileKeyboard = () => {
          if (!isMobileInputMode || Date.now() < suppressKeyboardFocusUntil) {
            return;
          }

          focusScribbleKeyboard();
        };

        const setScribbleSpaceVisible = visible => {
          if (!scribbleSpaceView) {
            return;
          }

          scribbleSpaceView.hidden = !visible;

          if (hintsBtn) {
            hintsBtn.hidden = visible;
          }

          if (checkBtn) {
            checkBtn.hidden = visible;
          }

          if (scribbleBtn) {
            scribbleBtn.setAttribute('aria-expanded', visible ? 'true' : 'false');
          }

          if (visible) {
            if (!isMobileInputMode) {
              focusScribbleKeyboard();
            }
          } else if (scribbleKeyboardInput) {
            scribbleKeyboardInput.blur();
          }
        };

        const toggleScribbleSpace = () => {
          if (!scribbleSpaceView) {
            return;
          }

          setScribbleSpaceVisible(scribbleSpaceView.hidden);
        };

        if (scribbleContainer) {
          const getTileFromTarget = target => {
            if (target instanceof Element) {
              return target.closest('.scribble-tile');
            }

            if (target && target.parentElement) {
              return target.parentElement.closest('.scribble-tile');
            }

            return null;
          };

          if (typeof window.PointerEvent === 'function') {
            scribbleContainer.addEventListener('pointerdown', event => {
              const tile = getTileFromTarget(event.target);

              if (!tile || !scribbleContainer.contains(tile)) {
                return;
              }

              if (event.pointerType !== 'touch' && event.button !== 0) {
                return;
              }

              event.preventDefault();
              startDraggedTile(tile, event.clientX, event.clientY, null, event.pointerId);

              if (tile.setPointerCapture) {
                tile.setPointerCapture(event.pointerId);
              }
            });

            scribbleContainer.addEventListener('pointermove', event => {
              if (dragState.pointerId !== null && event.pointerId !== dragState.pointerId) {
                return;
              }

              if (dragState.tile) {
                event.preventDefault();
              }

              moveDraggedTile(event.clientX, event.clientY);
            });

            const endPointerDrag = event => {
              if (dragState.pointerId !== null && event.pointerId !== dragState.pointerId) {
                return;
              }

              if (dragState.tile && dragState.tile.releasePointerCapture && event.pointerId !== undefined) {
                try {
                  if (dragState.tile.hasPointerCapture(event.pointerId)) {
                    dragState.tile.releasePointerCapture(event.pointerId);
                  }
                } catch (_error) {}
              }

              stopDraggedTile(event.clientX, event.clientY);
            };

            scribbleContainer.addEventListener('pointerup', endPointerDrag);
            scribbleContainer.addEventListener('pointercancel', endPointerDrag);
          } else {
            scribbleContainer.addEventListener('mousedown', event => {
              const tile = getTileFromTarget(event.target);

              if (!tile || !scribbleContainer.contains(tile) || event.button !== 0) {
                return;
              }

              event.preventDefault();
              startDraggedTile(tile, event.clientX, event.clientY);
            });

            window.addEventListener('mousemove', event => {
              moveDraggedTile(event.clientX, event.clientY);
            });
            window.addEventListener('mouseup', event => {
              stopDraggedTile(event.clientX, event.clientY);
            });

            scribbleContainer.addEventListener(
              'touchstart',
              event => {
                const tile = getTileFromTarget(event.target);

                if (!tile || !scribbleContainer.contains(tile) || !event.changedTouches.length) {
                  return;
                }

                const touch = event.changedTouches[0];
                event.preventDefault();
                startDraggedTile(tile, touch.clientX, touch.clientY, touch.identifier);
              },
              { passive: false }
            );

            window.addEventListener(
              'touchmove',
              event => {
                if (dragState.touchId === null) {
                  return;
                }

                const touch = Array.from(event.changedTouches).find(item => item.identifier === dragState.touchId);

                if (!touch) {
                  return;
                }

                event.preventDefault();
                moveDraggedTile(touch.clientX, touch.clientY);
              },
              { passive: false }
            );

            window.addEventListener('touchend', event => {
              if (dragState.touchId === null) {
                return;
              }

              const endedTouch = Array.from(event.changedTouches).find(item => item.identifier === dragState.touchId);

              if (endedTouch) {
                stopDraggedTile(endedTouch.clientX, endedTouch.clientY);
              }
            });

            window.addEventListener('touchcancel', stopDraggedTile);
          }
        }

        if (scribbleContainer) {
          scribbleContainer.addEventListener('click', event => {
            const target = event.target;

            if (!(target instanceof Element) || target.closest('.scribble-tile')) {
              return;
            }

            requestMobileKeyboard();
          });
        }

        if (scribbleKeyboardInput) {
          scribbleKeyboardInput.addEventListener('input', event => {
            const target = event.target;

            if (!(target instanceof HTMLInputElement)) {
              return;
            }

            const letters = target.value.match(/[a-zA-Z]/g) || [];

            letters.forEach(createScribbleTile);
            target.value = '';
          });
        }

        if (checkBtn && solutionActions && boxes.length >= 21) {
          checkBtn.addEventListener('click', () => {
            const firstWord = boxes
              .slice(0, 15)
              .map(box => box.value)
              .join('');
            const secondWord = boxes
              .slice(15, 21)
              .map(box => box.value)
              .join('');
            const attempt = `${firstWord} ${secondWord}`.trim().toLowerCase();

            if (attempt === 'congratulations doctor') {
              solutionActions.innerHTML = `
